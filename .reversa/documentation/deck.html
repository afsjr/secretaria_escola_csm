<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;color:#eaeaea;font-family:system-ui,sans-serif;overflow:hidden;height:100vh}
#slide{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:60px;transition:opacity .3s;background:#0a0a10}
#slide .content{max-width:900px;width:100%;text-align:center}
#slide h1{font-size:48px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#4a9eff,#7abaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#slide h2{font-size:28px;font-weight:600;color:#ccc;margin-bottom:20px}
#slide h3{font-size:18px;font-weight:500;color:#999;margin-bottom:12px}
#slide p{font-size:16px;color:#888;line-height:1.7;max-width:700px;margin:0 auto}
#slide .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px}
#slide .stat{padding:20px;background:rgba(18,18,26,.85);border:1px solid rgba(255,255,255,.06);border-radius:12px}
#slide .stat .num{font-size:32px;font-weight:700;color:#4a9eff}
#slide .stat .label{font-size:12px;color:#666;margin-top:4px}
#slide .preview-link{display:inline-block;margin-top:24px;padding:10px 24px;border:1px solid rgba(74,158,255,.3);border-radius:8px;color:#7abaff;text-decoration:none;font-size:14px;transition:.2s}
#slide .preview-link:hover{background:rgba(74,158,255,.1);border-color:#4a9eff}
#slide ul{text-align:left;max-width:600px;margin:16px auto;list-style:none}
#slide ul li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:15px;color:#999}
#slide ul li::before{content:'→ ';color:#4a9eff}
#nav{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:20;align-items:center}
#nav button{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(18,18,26,.85);color:#aaa;font-size:18px;cursor:pointer;transition:.2s;backdrop-filter:blur(8px)}
#nav button:hover{background:rgba(74,158,255,.2);border-color:#4a9eff;color:#fff}
#nav .counter{font-size:12px;color:#666;margin:0 12px}
#progress{position:fixed;top:0;left:0;height:3px;background:#4a9eff;z-index:30;transition:width .3s}
#fullscreen-hint{position:fixed;top:16px;right:16px;z-index:20;color:#444;font-size:11px;background:rgba(18,18,26,.7);padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.05)}
#slide .tag{display:inline-block;padding:3px 10px;background:rgba(74,158,255,.15);border:1px solid rgba(74,158,255,.2);border-radius:4px;color:#7abaff;font-size:11px;margin:4px}
#slide .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;margin:0 4px}
.badge-blue{background:rgba(74,158,255,.15);color:#7abaff}
.badge-green{background:rgba(108,196,108,.15);color:#6cc46c}
.badge-red{background:rgba(255,90,79,.15);color:#ff5a4f}
@media(max-width:768px){#slide h1{font-size:32px}#slide{padding:30px}}
</style>
</head>
<body>
<div id="progress"></div>
<div id="slide"></div>
<div id="fullscreen-hint">F fullscreen</div>
<div id="nav">
<button id="prev">◀</button>
<span class="counter" id="counter">1 / 7</span>
<button id="next">▶</button>
</div>
<script>
var slides = [
{
title:'secretaria_escola_csm',
subtitle:'Sistema de Gestão Escolar CSM',
body:'SPA em TypeScript + Vite com Supabase como backend. Gerencia alunos, professores, turmas, cursos, notas, documentos e finanças de instituições de ensino técnico.',
extra:'<div class="stats"><div class="stat"><div class="num">21.257</div><div class="label">Linhas de código</div></div><div class="stat"><div class="num">95</div><div class="label">Arquivos</div></div><div class="stat"><div class="num">11</div><div class="label">Módulos</div></div></div>'
},
{
title:'Arquitetura',
subtitle:'SPA + BaaS com Supabase',
body:'<span class="tag">Vite</span><span class="tag">TypeScript</span><span class="tag">Supabase Auth</span><span class="tag">PostgreSQL + RLS</span><span class="tag">Edge Functions</span><br><br>Service-Oriented Architecture dentro da SPA. Comunicação via HTTP REST com Supabase Client. Autenticação JWT com RBAC em 7 perfis. Validação com Zod.',
extra:'<a class="preview-link" href="arquitetura.html" target="_blank">Ver Code City 3D →</a>'
},
{
title:'Módulos',
subtitle:'11 módulos, 22 dependências diretas',
body:'<div class="stats">',
extra:'<div class="stats" style="max-width:500px;grid-template-columns:repeat(2,1fr)"><div class="stat"><div class="num" style="font-size:20px">lib</div><div class="label">7.214 LOC · 37 arquivos</div></div><div class="stat"><div class="num" style="font-size:20px">views</div><div class="label">7.985 LOC · 25 páginas</div></div><div class="stat"><div class="num" style="font-size:20px">Tabs</div><div class="label">1.785 LOC · 9 componentes</div></div><div class="stat"><div class="num" style="font-size:20px">styles</div><div class="label">1.705 LOC · main.css</div></div></div><a class="preview-link" href="modulos.html" target="_blank">Ver mapa de dependências →</a>'
},
{
title:'Métricas',
subtitle:'Distribuição de esforço no código',
body:'<span class="badge badge-blue">94% TypeScript</span><span class="badge badge-green">6% CSS</span><br><br>O módulo <strong>lib</strong> concentra 34% do código (7.214 LOC) com complexidade alta. <strong>views</strong> tem 38% (7.985 LOC) — arquivos de página. O histograma mostra que 64% dos arquivos têm entre 50 e 500 LOC.',
extra:'<a class="preview-link" href="metricas.html" target="_blank">Ver dashboard completo →</a>'
},
{
title:'9 Features',
subtitle:'Escopo completo do sistema',
body:'<ul><li>Autenticação e sessão com timeout de 30min</li><li>Administração de usuários com 7 perfis RBAC</li><li>Gestão acadêmica: turmas, matrículas, notas</li><li>Gestão de cursos, matriz curricular e ofertas</li><li>Dados do aluno com histórico completo</li><li>Gestão de professores e suas turmas</li><li>Solicitações de documentos acadêmicos</li><li>Gestão financeira com parcelas e acordos</li><li>Auditoria com gráficos de tendência</li></ul>'
},
{
title:'Dívidas Técnicas',
subtitle:'Oportunidades de melhoria identificadas',
body:'<span class="badge badge-red">Frequência simplificada</span><span class="badge badge-blue">Financeiro sem SQL aggregation</span><span class="badge badge-red">Rollback incompleto</span><span class="badge badge-blue">Sem testes E2E</span><br><br>Implementação log-only de presença, iteração manual em JS no financeiro, try-catch sem rollback real do usuário auth, e cobertura apenas unitária (Vitest).',
extra:''
},
{
title:'Próximos Passos',
subtitle:'',
body:'O Reversa já gerou especificações executáveis para todos os 9 módulos. A pipeline forward está concluída com 4 features implementadas: tipos de curso, geração de certificados, gráficos de auditoria e central de notificações.',
extra:'<div style="margin-top:24px;color:#666;font-size:13px">Documentação gerada pelo Reversa Docs · 2026</div>'
}
];

var current = 0;
var slideEl = document.getElementById('slide');
var counterEl = document.getElementById('counter');
var progressEl = document.getElementById('progress');

function render(i){
var s = slides[i];
var html = '<div class="content">';
if(s.title) html += '<h1>' + s.title + '</h1>';
if(s.subtitle) html += '<h2>' + s.subtitle + '</h2>';
if(s.body) html += '<p>' + s.body + '</p>';
if(s.extra) html += s.extra;
html += '</div>';
slideEl.style.opacity = 0;
setTimeout(function(){
slideEl.innerHTML = html;
slideEl.style.opacity = 1;
}, 150);
counterEl.textContent = (i+1) + ' / ' + slides.length;
progressEl.style.width = ((i+1)/slides.length*100) + '%';
}

document.getElementById('prev').addEventListener('click', function(){
if(current > 0){ current--; render(current); }
});
document.getElementById('next').addEventListener('click', function(){
if(current < slides.length-1){ current++; render(current); }
});
document.addEventListener('keydown', function(e){
if(e.key === 'ArrowLeft' && current > 0){ current--; render(current); }
if(e.key === 'ArrowRight' && current < slides.length-1){ current++; render(current); }
if(e.key === 'f' || e.key === 'F'){
if(!document.fullscreenElement) document.documentElement.requestFullscreen();
else document.exitFullscreen();
}
});

render(0);
</script>
</body>
</html>
