name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js 🚀
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências 🔧
        run: npm ci

      - name: Construir Projeto (Build) 🏗️
        run: |
          echo "🔧 Configurando variáveis de ambiente..."
          echo "   -> Variáveis de ambiente são injetadas automaticamente via Vercel Environment Variables"
          echo "   -> Para funcionamento em produção, configure as variáveis em:"
          echo "      Settings > Environment Variables > Production"
          echo ""
          echo "   -> Variáveis necessárias:"
          echo "      - VITE_SUPABASE_URL"
          echo "      - VITE_SUPABASE_ANON_KEY"
          echo "      - VITE_SUPABASE_SERVICE_ROLE_KEY (para reset de senha)"
          echo ""
          echo "🔨 Executando build..."
          npm run build
          echo "✅ Build concluído!"

      - name: Publicar (Deploy) 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
