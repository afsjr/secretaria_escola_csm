var TCOL = {code:0x4a9eff,test:0x6cc46c,config:0xffc857,style:0xff9aa2,asset:0x999999};

ren.setSize(ctn.clientWidth, ctn.clientHeight); ren.shadowMap.enabled = true; ren.shadowMap.type = THREE.PCFSoftShadowMap;

var hemi = new THREE.HemisphereLight(0xddeeff,0x202028,0.5); hemi.position.set(0,200,0); sc.add(hemi);
var dir = new THREE.DirectionalLight(0xffffff,0.8); dir.position.set(80,200,100); dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048); sc.add(dir);

var gnd = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:0x14141a,roughness:1}));
gnd.rotation.x = -Math.PI/2; gnd.position.set(40,-0.5,40); gnd.receiveShadow = true; sc.add(gnd);

var dists = {};
mods.forEach(function(m){ if(!dists[m.folder]) dists[m.folder] = []; dists[m.folder].push(m); });
var fkeys = Object.keys(dists).sort();
var gcols = Math.ceil(Math.sqrt(fkeys.length));
function dSize(c){ return Math.sqrt(c)*6*1.5; }
var dpos = {};
var ox=0, oz=0;
fkeys.forEach(function(fk,i){

ox += sz + 8; if((i+1)%gcols === 0){ ox=0; oz += sz+8; }
});

mods.forEach(function(m){
var d = dpos[m.folder], ms = dists[m.folder];
var cols = Math.ceil(Math.sqrt(ms.length)), rows = Math.ceil(ms.length/cols);

});

var bg = new THREE.Group(); sc.add(bg);

var boxGeo = new THREE.BoxGeometry(1,1,1); boxGeo.translate(0,0.5,0);
function build(){
while(bg.children.length){ var c = bg.children[0]; if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose(); bg.remove(c); }
var flt = mods.filter(function(m){ return FOLDER_FILTER === 'all' || m.folder === FOLDER_FILTER; });
if(!flt.length) return;
var mat = new THREE.MeshStandardMaterial({roughness:0.5,metalness:0.1});
var im = new THREE.InstancedMesh(boxGeo,mat,flt.length);

flt.forEach(function(m,i){

function syncDL(){
dlEl.innerHTML = '';
if(FOLDER_FILTER !== 'all') return;
fkeys.forEach(function(fk){

var p = new THREE.Vector3(d.x+d.size/2,0,d.z+d.size/2);

ptr.x = ((e.clientX-r.left)/r.width)*2-1;
ptr.y = -((e.clientY-r.top)/r.height)*2+1;

var hits = ray.intersectObjects(bg.children.filter(function(c){return c.isInstancedMesh;}));

var m = flt[hits[0].instanceId];
if(m){ tip.innerHTML = '<div class="fn">'+m.name+'</div><div class="meta">LOC: '+m.loc+' | Complexidade: '+m.complexity+'<br>'+m.folder+'</div>';

});

document.querySelectorAll('aside input[type=range]').forEach(function(sl){
sl.addEventListener('input',function(e){
var v = parseFloat(e.target.value);
if(e.target.dataset.param === 'locScale') LOC_SCALE = v;

mods.forEach(function(m){ m._h = Math.max(MIN_H, m.loc*LOC_SCALE); });

});
document.querySelectorAll('aside input[type=checkbox]').forEach(function(cb){
cb.addEventListener('change',function(e){
SHOW_DISTRICTS = e.target.checked; build();

});
var sel = document.querySelector('select[data-param=folderFilter]');
fkeys.forEach(function(fk){ var o=document.createElement('option'); o.value=fk; o.textContent=fk; sel.appendChild(o); });

setTimeout(function(){document.getElementById('loader').className='loader hidden';},200);
(function tick(){ctrl.update();ren.render(sc,cam);syncDL();requestAnimationFrame(tick);})();
})();
</script>
