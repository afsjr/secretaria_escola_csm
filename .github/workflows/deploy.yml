name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js 🚀
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências 🔧
        run: npm ci

      - name: Construir Projeto (Build) 🏗️
        run: |
          echo "🔧 Configurando variáveis de ambiente..."
          export VITE_SUPABASE_URL="https://cfybsocrydeziibonvbd.supabase.co"
          export VITE_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeWJzb2NyeWRlemlpYm9udmJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjYxNjksImV4cCI6MjA5MDU0MjE2OX0.iBjdBeegHl8-RDmdsew1jbLjF9kyUm-loh4SUAVNLSc"
          export VITE_SUPABASE_SERVICE_ROLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeWJzb2NyeWRlemlpYm9udmJkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk2NjE2OSwiZXhwIjoyMDkwNTQyMTY5fQ.iYszfZxeS9fHnsuPYKLzVhu188ZBtg3sFkEaAoGYg_A"
          echo "🔨 Executando build..."
          npm run build
          echo "✅ Build concluído!"

      - name: Publicar (Deploy) 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
