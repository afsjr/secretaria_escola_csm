name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js 🚀
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependências 🔧
        run: npm install

      - name: Construir Projeto (Build) 🏗️
        run: |
          echo "🔧 Configurando variáveis de ambiente..."
          echo "VITE_SUPABASE_URL=https://cfybsocrydeziibonvbd.supabase.co" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_5M8bVwEUPdg1zVx6Nfxg6Q_veLFM0_t" >> $GITHUB_ENV
          echo "VITE_SUPABASE_SERVICE_ROLE_KEY=$VITE_SUPABASE_SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "🔨 Executando build..."
          npm run build
          echo "✅ Build concluído!"
        env:
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Publicar (Deploy) 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # A pasta de destino do site será a gh-pages
          folder: dist # Pasta gerada pelo 'npm run build'
