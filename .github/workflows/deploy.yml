name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js 🚀
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências 🔧
        run: npm ci

      - name: Construir Projeto (Build) 🏗️
        run: |
          echo "🔧 Configurando variáveis de ambiente via GitHub Secrets..."
          export VITE_SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export VITE_SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          export VITE_SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          echo "✅ Variáveis configuradas"
          echo "🔨 Executando build..."
          npm run build
          echo "✅ Build concluído!"

      - name: Publicar (Deploy) 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
