openapi: 3.0.3
info:
  title: API Sistema Secretaria Escolar CSM
  description: |
    API do sistema de gestão escolar com autenticação Supabase.
    Endpoints expostos via Supabase Client e Edge Functions.
  version: 1.0.0
  contact:
    name: Suporte CSM

servers:
  - url: https://{project}.supabase.co
    variables:
      project:
        default: seu-projeto
    description: Servidor Supabase

tags:
  - name: Auth
    description: Autenticação e sessão
  - name: Admin
    description: Operações administrativas
  - name: Students
    description: Gestão de alunos
  - name: Professors
    description: Gestão de professores
  - name: Academic
    description: Notas e frequência
  - name: Courses
    description: Cursos e disciplinas
  - name: Financeiro
    description: Cobranças e pagamentos
  - name: Documents
    description: Solicitação de documentos
  - name: Audit
    description: Logs de auditoria

paths:
  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Login usuário
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'

  /auth/v1/user:
    get:
      tags: [Auth]
      summary: Obter usuário atual
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /functions/v1/admin-create-user:
    post:
      tags: [Admin]
      summary: Criar novo usuário
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, nomeCompleto]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                nomeCompleto:
                  type: string
                cpf:
                  type: string
                telefone:
                  type: string
                perfil:
                  type: string
                  enum: [admin, master_admin, professor, aluno]
      responses:
        '200':
          description: Usuário criado
        '400':
          description: Erro na criação

  /rest/v1/perfis:
    get:
      tags: [Students]
      summary: Listar alunos
      operationId: listAlunos
      security:
        - BearerAuth: []
      parameters:
        - name: perfil
          in: query
          schema:
            type: string
            enum: [aluno, professor, admin]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Lista de perfis

  /rest/v1/pagamentos:
    get:
      tags: [Financeiro]
      summary: Listar pagamentos
      operationId: getPagamentos
      security:
        - BearerAuth: []
      parameters:
        - name: aluno_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
          enum: [pendente, pago, atrasado, acordo]
      responses:
        '200':
          description: Lista de pagamentos

    post:
      tags: [Financeiro]
      summary: Criar pagamento/débito
      operationId: createPagamento
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [aluno_id, descricao, valor_original, data_vencimento]
              properties:
                aluno_id:
                  type: string
                descricao:
                  type: string
                valor_original:
                  type: number
                data_vencimento:
                  type: string
                  format: date
                status:
                  type: string
      responses:
        '201':
          description: Pagamento criado

  /rest/v1/documents:
    get:
      tags: [Documents]
      summary: Listar solicitações
      operationId: getDocuments
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
          type: string
      responses:
        '200':
          description: Lista de documentos

    post:
      tags: [Documents]
      summary: Criar solicitação
      operationId: createDocumentRequest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, type]
              properties:
                user_id:
                  type: string
                type:
                  type: string
      responses:
        '201':
          description: Solicitação criada

  /rest/v1/audit_log:
    get:
      tags: [Audit]
      summary: Listar logs de auditoria
      operationId: getAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - name: acao
          in: query
          schema:
            type: string
        - name: usuario_id
          in: query
          schema:
            type: string
        - name: data_inicio
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Lista de logs

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: integer

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string

    Perfil:
      type: object
      properties:
        id:
          type: string
        nome_completo:
          type: string
        cpf:
          type: string
        email:
          type: string
        perfil:
          type: string

    Pagamento:
      type: object
      properties:
        id:
          type: string
        aluno_id:
          type: string
        descricao:
          type: string
        valor_original:
          type: number
        status:
          type: string

    AuditLog:
      type: object
      properties:
        id:
          type: string
        usuario_id:
          type: string
        acao:
          type: string
        descricao:
          type: string
        created_at:
          type: string
          format: date-time